<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BizAudit — Cold Prospect Framework</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sidebar-bg: #0d1117;
    --sidebar-border: rgba(255,255,255,0.07);
    --sidebar-text: #8b949e;
    --sidebar-active-bg: rgba(255,255,255,0.06);
    --main-bg: #f6f8fa;
    --card-bg: #ffffff;
    --text-primary: #1c2128;
    --text-secondary: #57606a;
    --text-tertiary: #8c959f;
    --border: #d0d7de;
    --border-light: #e8eaed;
    --radius: 10px;
    --radius-sm: 6px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--main-bg);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ─── TOP BAR ─── */
  .topbar {
    background: var(--sidebar-bg);
    color: #fff;
    padding: 0 28px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid var(--sidebar-border);
    flex-shrink: 0;
  }
  .topbar-brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .topbar-logo {
    width: 28px; height: 28px;
    background: #2563eb;
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; color: #fff;
  }
  .topbar-name {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.01em;
  }
  .topbar-sub {
    font-size: 13px;
    color: var(--sidebar-text);
    margin-left: 6px;
  }
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .progress-pill {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: #8b949e;
  }
  .progress-pill span { color: #fff; font-weight: 500; }
  .overall-bar-wrap {
    width: 120px;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    overflow: hidden;
  }
  .overall-bar {
    height: 100%;
    background: #2563eb;
    border-radius: 4px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* ─── LAYOUT ─── */
  .layout {
    display: grid;
    grid-template-columns: 240px 1fr;
    flex: 1;
    min-height: 0;
  }

  /* ─── SIDEBAR ─── */
  .sidebar {
    background: var(--sidebar-bg);
    border-right: 1px solid var(--sidebar-border);
    overflow-y: auto;
    position: sticky;
    top: 56px;
    height: calc(100vh - 56px);
    padding: 16px 0 32px;
  }
  .sidebar::-webkit-scrollbar { width: 3px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

  .sidebar-section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    padding: 8px 20px 6px;
    margin-top: 4px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
    border-left: 3px solid transparent;
  }
  .nav-item:hover { background: rgba(255,255,255,0.04); }
  .nav-item.active {
    background: var(--sidebar-active-bg);
    border-left-color: var(--ph-color);
  }
  .nav-num {
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600;
    flex-shrink: 0;
    transition: all 0.2s;
    border: 1.5px solid var(--ph-color);
    color: var(--ph-color);
  }
  .nav-item.active .nav-num {
    background: var(--ph-color);
    color: #fff;
  }
  .nav-info { flex: 1; min-width: 0; }
  .nav-label {
    font-size: 12.5px;
    color: rgba(255,255,255,0.45);
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .nav-item.active .nav-label { color: rgba(255,255,255,0.9); font-weight: 500; }
  .nav-count { font-size: 10px; color: rgba(255,255,255,0.2); margin-top: 1px; }
  .nav-item.active .nav-count { color: rgba(255,255,255,0.4); }
  .nav-pbar {
    height: 2px;
    background: rgba(255,255,255,0.06);
    margin: 0 16px 2px;
    border-radius: 2px;
    overflow: hidden;
  }
  .nav-pfill { height: 100%; border-radius: 2px; transition: width 0.4s; }

  /* ─── MAIN CONTENT ─── */
  .main {
    padding: 32px 40px 60px;
    max-width: 860px;
  }

  .phase-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
  }
  .phase-tag::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
  }

  .phase-title {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--text-primary);
    margin-bottom: 8px;
    line-height: 1.2;
    letter-spacing: -0.02em;
  }
  .phase-desc {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.7;
    margin-bottom: 10px;
    max-width: 620px;
  }

  .phase-progress-bar {
    height: 3px;
    background: var(--border-light);
    border-radius: 3px;
    margin-bottom: 28px;
    overflow: hidden;
  }
  .phase-progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.4s;
  }

  /* ─── STEP CARDS ─── */
  .step-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .step-card:hover { border-color: #b0b8c4; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .step-card.done { opacity: 0.65; }

  .step-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px 18px;
    cursor: default;
  }

  .checkbox {
    width: 20px; height: 20px;
    border-radius: 5px;
    border: 1.5px solid var(--border);
    flex-shrink: 0;
    margin-top: 2px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    background: #fff;
  }
  .checkbox:hover { border-color: #2563eb; }
  .checkbox.checked {
    background: #16a34a;
    border-color: #16a34a;
  }
  .checkbox svg { display: none; }
  .checkbox.checked svg { display: block; }

  .step-body { flex: 1; }
  .step-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 3px;
    line-height: 1.4;
  }
  .step-card.done .step-name { text-decoration: line-through; color: var(--text-secondary); }
  .step-hint {
    font-size: 13.5px;
    color: var(--text-secondary);
    line-height: 1.6;
  }

  .detail-btn {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    background: var(--main-bg);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-sm);
    padding: 5px 12px;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .detail-btn:hover { background: #fff; border-color: var(--border); color: var(--text-primary); }
  .detail-btn.open { background: #fff; border-color: var(--border); }

  /* ─── STEP DETAIL ─── */
  .step-detail {
    display: none;
    padding: 0 18px 18px 52px;
    border-top: 1px solid var(--border-light);
  }
  .step-detail.visible { display: block; }

  .detail-section { margin-top: 14px; }
  .detail-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .07em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    margin-bottom: 8px;
  }

  .check-list { list-style: none; }
  .check-list li {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.6;
    padding: 3px 0 3px 18px;
    position: relative;
  }
  .check-list li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--text-tertiary);
    font-size: 12px;
    top: 4px;
  }

  /* ─── EXAMPLE BOX ─── */
  .example-box {
    background: #f0f6ff;
    border: 1px solid #c8ddf8;
    border-left: 3px solid var(--ph-color, #2563eb);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    margin-top: 4px;
  }
  .example-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--ph-color, #2563eb);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .example-label::before {
    content: '';
    width: 14px; height: 14px;
    background: var(--ph-color, #2563eb);
    border-radius: 3px;
    opacity: 0.15;
  }
  .example-text {
    font-size: 13.5px;
    color: #1e3a5f;
    line-height: 1.75;
  }

  /* ─── TAG PILLS ─── */
  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .tag {
    font-size: 12px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .tag-tool { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
  .tag-out { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }

  /* ─── OUTPUT ROW ─── */
  .output-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    background: #f9fafb;
    border: 1px solid var(--border-light);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    margin-top: 4px;
  }
  .output-icon {
    width: 20px; height: 20px;
    background: #d1fae5;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .output-text { font-size: 13.5px; color: var(--text-secondary); line-height: 1.5; }

  /* ─── FOOTER NAV ─── */
  .footer-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 36px;
    padding-top: 24px;
    border-top: 1px solid var(--border-light);
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    padding: 10px 20px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
  }
  .btn-ghost {
    background: #fff;
    border: 1px solid var(--border);
    color: var(--text-primary);
  }
  .btn-ghost:hover { background: var(--main-bg); }
  .btn-primary {
    background: #2563eb;
    border: 1px solid #2563eb;
    color: #fff;
  }
  .btn-primary:hover { background: #1d4ed8; border-color: #1d4ed8; }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .main { padding: 20px 18px 48px; }
    .topbar-sub { display: none; }
    .overall-bar-wrap { display: none; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <div class="topbar-brand">
    <div class="topbar-logo">B</div>
    <span class="topbar-name">BizAudit</span>
    <span class="topbar-sub">Cold Prospect Framework — Public Data Only</span>
  </div>
  <div class="topbar-right">
    <div class="progress-pill"><span id="done-count">0</span> / <span id="total-count">0</span> steps done</div>
    <div class="overall-bar-wrap"><div class="overall-bar" id="overall-bar"></div></div>
  </div>
</header>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar"></aside>

  <!-- MAIN -->
  <main class="main" id="main"></main>
</div>

<script>
const PHASES = [
  {
    color: '#2563eb',
    name: 'Business discovery',
    desc: 'Identify and document the business entirely from public search results before opening any tool.',
    steps: [
      {
        name: 'Find and confirm the business on Google',
        hint: 'Search the exact business name to see what Google already knows about them.',
        checks: [
          'Type the exact business name into Google — does a knowledge panel appear on the right side?',
          'Open Google Maps and search the name — is there a pin with reviews and photos?',
          'Check whether "Permanently closed" appears anywhere on the listing',
          'Note the top 3 search result URLs — are they the business website, a directory, or something else?'
        ],
        example: 'Search "Al-Fatah Superstore Lahore" on Google. A knowledge panel appears showing 4.1 stars, 312 reviews, address on Main Boulevard. On Maps the pin is placed correctly. No "permanently closed" label. Top results: their website alfattah.com, a Facebook page, and a Yelp listing. This confirms the business is active with a solid online footprint.',
        tools: ['Google Search', 'Google Maps'],
        output: 'Business confirmed — note the name, city, industry, and all visible URLs in your audit doc'
      },
      {
        name: 'Record every publicly visible data point',
        hint: 'In one single pass, copy everything Google surfaces before clicking any link.',
        checks: [
          'Exact business name as shown on Maps (copy it verbatim)',
          'Full address including neighborhood or area',
          'Phone number visible on the knowledge panel',
          'Website URL listed on the panel',
          'Category label shown (e.g. "Grocery store", "Hair salon")',
          'Star rating and total review count',
          'Hours of operation',
          'Number of photos visible in the panel photo strip'
        ],
        example: 'From the knowledge panel for "Yasmin Boutique Lahore": Name — Yasmin Boutique. Address — 23 MM Alam Road, Gulberg III. Phone — 0300-1234567. Website — none listed. Category — Women\'s clothing store. Rating — 3.8 stars, 47 reviews. Hours — 11am–9pm daily. Photos — 8 photos. Key insight: no website is a critical gap. Only 47 reviews is low for a retail clothing store in that area.',
        tools: ['Google Maps', 'Google Search'],
        output: 'Baseline data sheet with all 8 data points recorded — this is the foundation of your entire report'
      }
    ]
  },
  {
    color: '#0f9d58',
    name: 'Google Business Profile',
    desc: 'Everything here is audited from the public Maps listing — no GBP dashboard access or owner login needed.',
    steps: [
      {
        name: 'Check if the listing is claimed or unclaimed',
        hint: 'An unclaimed listing has an "Own this business?" link visible at the bottom of the panel.',
        checks: [
          'On the Google Maps panel, scroll to the bottom — does "Own this business?" appear?',
          'If unclaimed: the owner has zero control over the listing — a major vulnerability anyone can exploit',
          'If claimed: check if it shows a verified checkmark next to the business name',
          'Search the business name + city — do two separate map pins appear? Duplicate listings cause ranking confusion'
        ],
        example: 'Searching "Karachi Bites Restaurant" on Maps shows "Own this business?" at the bottom of the panel. This means the listing is UNCLAIMED. The business cannot respond to reviews, update hours, add photos, or post offers. Worse — a competitor or spammer could claim it. This is a critical finding that costs them nothing to fix and takes 5 minutes to initiate.',
        tools: ['Google Maps'],
        output: 'Claim status note — claimed / unclaimed / unverified with screenshot as evidence'
      },
      {
        name: 'NAP consistency check across 5 sources',
        hint: 'Name, Address, Phone must be identical on every platform. Even small differences hurt local ranking.',
        checks: [
          'Copy the NAP (Name, Address, Phone) exactly from Google Maps',
          'Open Yelp and search the business — does the address format match exactly? (St vs Street, No. vs #)',
          'Find their Facebook page — does the phone number match character-for-character?',
          'Check Apple Maps (maps.apple.com) — same address format?',
          'Visit their website footer if available — same phone and full address?',
          'Note every difference, even minor punctuation — each inconsistency is a ranking signal lost'
        ],
        example: 'Google Maps shows: "Shop 4, Liberty Market, Lahore." Yelp shows: "Liberty Market Lahore." Facebook shows: "4 Liberty Market, Lahore, Punjab." Website footer shows: "Liberty Mkt, Lahore — 0300-111-2222." That is 4 different formats across 4 platforms. Google\'s algorithm expects exact matches as a trust signal. Each inconsistency weakens their local ranking. The fix is to standardize every listing to one exact format.',
        tools: ['Google Maps', 'Yelp', 'Facebook', 'Apple Maps (maps.apple.com)'],
        output: 'NAP comparison table showing each platform and every inconsistency found'
      },
      {
        name: 'Categories, attributes, and description',
        hint: 'Review how the listing describes itself — all visible from the public Maps panel.',
        checks: [
          'What is the primary category shown? Is it the most specific option available for their business type?',
          'Click "See more" on the panel — are additional secondary categories listed?',
          'Is a business description visible? Does it mention the city and key services?',
          'Are any attributes shown? (Women-owned, wheelchair accessible, delivery available, etc.)',
          'Do they have a website linked? A booking button? An order online option?'
        ],
        example: 'A dental clinic in Karachi is listed under the generic "Doctor" category instead of "Dentist" or "Dental clinic." This means they appear in far fewer relevant searches. The description reads "We provide dental services." — no city, no specialisations, no reason to choose them. Compare to a competitor showing: "Dentist — General dentistry, teeth whitening, orthodontics. Serving DHA Karachi since 2010." The competitor wins every search impression comparison.',
        tools: ['Google Maps'],
        output: 'Category and completeness score out of 5 — with specific improvement list'
      },
      {
        name: 'Photos audit',
        hint: 'Count and assess every photo visible publicly on their Maps listing. Quality and quantity both matter.',
        checks: [
          'Click the photo strip on the panel — how many total photos are there?',
          'Are any photos uploaded by the owner vs by customers? (check the source label on each photo)',
          'Do photos show interior, exterior, products/services, team, and menu or work samples?',
          'Are photos recent or clearly old and low quality (blurry, dark, poor framing)?',
          'Check the top 2 competitors — how many photos do they have by comparison?'
        ],
        example: 'A restaurant in Islamabad has 6 photos total — all taken by customers on their phones, dim and blurry. No professional shots of the interior, menu dishes, or food presentation. Competitor 1 has 94 photos. Competitor 2 has 47 photos. Google data shows businesses with 100+ photos get 5x more direction requests. This business is losing enormous visibility for zero cost. A smartphone and 30 minutes is all it takes.',
        tools: ['Google Maps'],
        output: 'Photo count and quality assessment — with competitor comparison numbers'
      },
      {
        name: 'Reviews — volume, rating, recency, and response rate',
        hint: 'Analyze all publicly visible reviews without any account access needed.',
        checks: [
          'Total review count — is this competitive for their industry in their city?',
          'Average star rating — below 4.0 means customers are actively choosing competitors instead',
          'Click "Most recent" sort — when was the very last review posted?',
          'Scroll through 15-20 reviews — are there recurring complaints across multiple reviewers?',
          'Is the owner responding to reviews? To negative ones specifically? What is the approximate response rate?',
          'Do any reviews look suspicious? (5 stars, no text, multiple posted same day — signals fake reviews)'
        ],
        example: 'A beauty salon in Karachi has 23 reviews averaging 3.6 stars. The last review was 4 months ago. Three separate reviews mention "long wait times." The owner has responded to 2 out of 23 reviews — both were positive, every negative review has been ignored. A 3.6 average means in a Google local pack of 3 results, users will choose either competitor showing 4.4+. The wait-time pattern across multiple reviews suggests an operational issue, not just a marketing one — this belongs in the report.',
        tools: ['Google Maps'],
        output: 'Review health summary — rating, volume, recency, response rate, and top recurring themes'
      }
    ]
  },
  {
    color: '#e37400',
    name: 'Website audit',
    desc: 'Every tool used here is free and public-facing. No login or owner access of any kind required.',
    steps: [
      {
        name: 'First impressions and homepage clarity',
        hint: 'Open the website as a first-time visitor. Can you understand who they are and what to do in 5 seconds?',
        checks: [
          'Does the homepage headline clearly state what they do and where they are located?',
          'Is there a visible phone number or call-to-action above the scroll line (no scrolling needed)?',
          'Open the site on your actual phone — does it load and display correctly on mobile?',
          'Does the copyright year in the footer suggest the site is actively maintained?',
          'Is there anything broken, outdated, or unprofessional visible on first load?'
        ],
        example: 'Opening herbaldoc.pk on mobile shows a desktop-only layout requiring horizontal scrolling. The headline reads "Welcome to Our Website" — zero information about what they offer or where. Phone number is buried on the Contact page (3 clicks away). Footer copyright says 2019. Over 70% of web traffic in Pakistan is mobile. A mobile visitor will bounce in 8 seconds. Fix: update the headline to "Herbal clinic in Lahore — book a consultation today" and add a click-to-call button in the header.',
        tools: ['Browser (visit site on your actual phone)'],
        output: 'First impressions verdict with screenshot of the above-the-fold view on mobile'
      },
      {
        name: 'Performance — run PageSpeed Insights',
        hint: 'Go to pagespeed.web.dev, enter the URL, and run for mobile. Mobile score is what Google uses for ranking.',
        checks: [
          'Mobile performance score — below 50 is critical, 50–89 needs work, 90+ is good',
          'Desktop performance score — for comparison context',
          'Note the top 3 "Opportunities" listed — these are the specific highest-impact speed fixes',
          'LCP (Largest Contentful Paint) — over 4 seconds on mobile is a significant SEO ranking issue',
          'CLS score (Cumulative Layout Shift) — over 0.25 means things are jumping around when the page loads'
        ],
        example: 'PageSpeed result for a Karachi law firm: Mobile score 23/100. Desktop score 51/100. Top 3 opportunities: 1) Eliminate render-blocking resources — saves 3.1s. 2) Properly size images — their homepage banner is a 4MB raw photo, saves 2.8s. 3) Serve images in WebP format. LCP is 8.2 seconds on mobile vs Google\'s target of 2.5s. Every extra second of load time reduces conversions by ~7%. This site is losing a large portion of visitors before the page even fully loads.',
        tools: ['PageSpeed Insights (pagespeed.web.dev — completely free)'],
        output: 'Screenshot of PageSpeed mobile score + top 3 specific issues listed with their savings estimate'
      },
      {
        name: 'SEO basics — check from the browser',
        hint: 'The most critical on-page SEO elements can be verified in under 5 minutes without any paid tool.',
        checks: [
          'Right-click the homepage → View Page Source → search for <title> — does it include the business name and city?',
          'In the source, search "description" — is there a meta description? Is it readable and under 160 chars?',
          'On the live page, is there one clear H1 heading? Does it reflect what the business actually does?',
          'Type site:domain.com in Google — how many pages are indexed? Under 5 pages is a serious gap',

      {

  },
  {
    color: '#dc2626',
    name: 'Report & cold outreach',
    desc: 'Package everything into a professional report and a message the business owner cannot ignore.',

      {
        name: 'Compile the full audit into a structured document',

// ─── STATE ───
let currentPhase = 0;
const checked = {};
PHASES.forEach((p, pi) => p.steps.forEach((_, si) => checked[`${pi}-${si}`] = false));

function totalSteps() { return Object.keys(checked).length; }
function doneSteps() { return Object.values(checked).filter(Boolean).length; }
function phaseDone(pi) { return PHASES[pi].steps.filter((_, si) => checked[`${pi}-${si}`]).length; }

// ─── UPDATE PROGRESS UI ───
function updateProgress() {
  const d = doneSteps(), t = totalSteps();
  document.getElementById('done-count').textContent = d;
  document.getElementById('total-count').textContent = t;
  document.getElementById('overall-bar').style.width = (t ? Math.round(d/t*100) : 0) + '%';
}

// ─── RENDER SIDEBAR ───
function renderSidebar() {
  let h = '<div class="sidebar-section-label">Phases</div>';
  PHASES.forEach((p, pi) => {
    const pd = phaseDone(pi), pt = p.steps.length, pct = Math.round(pd/pt*100);
    const isA = pi === currentPhase;
    h += `<div class="nav-item${isA?' active':''}" style="--ph-color:${p.color}" onclick="switchPhase(${pi})">
      <div class="nav-num">${String(pi+1).padStart(2,'0')}</div>
      <div class="nav-info">
        <div class="nav-label">${p.name}</div>
        <div class="nav-count">${pd} / ${pt} done</div>
      </div>
    </div>
    <div class="nav-pbar"><div class="nav-pfill" style="width:${pct}%;background:${p.color}"></div></div>`;
  });
  document.getElementById('sidebar').innerHTML = h;
}

// ─── RENDER MAIN ───
function renderMain() {
  const p = PHASES[currentPhase];
  const pd = phaseDone(currentPhase), pt = p.steps.length;
  const pct = pt ? Math.round(pd/pt*100) : 0;

  let h = `
    <div class="phase-tag" style="background:${p.color}18;color:${p.color}">Phase ${currentPhase+1} of ${PHASES.length}</div>
    <h1 class="phase-title">${p.name}</h1>
    <p class="phase-desc">${p.desc}</p>
    <div class="phase-progress-bar"><div class="phase-progress-fill" style="width:${pct}%;background:${p.color}"></div></div>
  `;

  p.steps.forEach((s, si) => {
    const key = `${currentPhase}-${si}`;
    const done = checked[key];
    h += `
      <div class="step-card${done?' done':''}" id="card-${si}">
        <div class="step-header">
          <div class="checkbox${done?' checked':''}" onclick="toggleCheck(${si})" id="chk-${si}">
            <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
              <polyline points="1.5,5.5 4.5,8.5 9.5,2.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="step-body">
            <div class="step-name">${s.name}</div>
            <div class="step-hint">${s.hint}</div>
          </div>
          <button class="detail-btn" id="btn-${si}" onclick="toggleDetail(${si})">Details ▾</button>
        </div>
        <div class="step-detail" id="det-${si}" style="--ph-color:${p.color}">
          <div class="detail-section">
            <div class="detail-label">What to check</div>
            <ul class="check-list">
              ${s.checks.map(c => `<li>${c}</li>`).join('')}
            </ul>
          </div>
          <div class="detail-section">
            <div class="detail-label">Real-world example</div>
            <div class="example-box" style="border-left-color:${p.color};background:${p.color}0d;border-color:${p.color}30">
              <div class="example-label" style="color:${p.color}">Example scenario</div>
              <div class="example-text">${s.example}</div>
            </div>
          </div>
          <div class="detail-section">
            <div class="detail-label">Tools to use</div>
            <div class="tags">
              ${s.tools.map(t => `<span class="tag tag-tool">${t}</span>`).join('')}
            </div>
          </div>
          <div class="detail-section">
            <div class="detail-label">Deliverable / output</div>
            <div class="output-row">
              <div class="output-icon">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polyline points="1.5,6 4.5,9 10.5,2.5" stroke="#15803d" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </div>
              <div class="output-text">${s.output}</div>
            </div>
          </div>
        </div>
      </div>
    `;
  });

  h += `
    <div class="footer-nav">
      <button class="btn btn-ghost" onclick="switchPhase(${currentPhase-1})" style="${currentPhase===0?'visibility:hidden':''}">← Previous phase</button>
      <button class="btn btn-primary" onclick="${currentPhase < PHASES.length-1 ? `switchPhase(${currentPhase+1})` : "alert('Audit complete! All phases done.')' "}">
        ${currentPhase < PHASES.length-1 ? 'Next phase →' : 'Complete audit ✓'}
      </button>
    </div>
  `;

  const main = document.getElementById('main');
  main.innerHTML = h;
  main.scrollTop = 0;
}

// ─── ACTIONS ───
function switchPhase(i) {
  if (i < 0 || i >= PHASES.length) return;
  currentPhase = i;
  renderSidebar();
  renderMain();
  window.scrollTo(0, 0);
}

function toggleCheck(si) {
  const key = `${currentPhase}-${si}`;
  checked[key] = !checked[key];

  const card = document.getElementById(`card-${si}`);
  const chk = document.getElementById(`chk-${si}`);
  if (checked[key]) { card.classList.add('done'); chk.classList.add('checked'); }
  else { card.classList.remove('done'); chk.classList.remove('checked'); }

  updateProgress();
  renderSidebar();
}

function toggleDetail(si) {
  const det = document.getElementById(`det-${si}`);
  const btn = document.getElementById(`btn-${si}`);
  const open = det.classList.contains('visible');
  det.classList.toggle('visible', !open);
  btn.classList.toggle('open', !open);
  btn.textContent = open ? 'Details ▾' : 'Close ▴';
}

// ─── INIT ───
renderSidebar();
renderMain();
updateProgress();
</script>
</body>
</html>

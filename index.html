<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BizAudit — Cold Prospect Framework</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <div class="topbar-brand">
    <div class="topbar-logo">B</div>
    <span class="topbar-name">BizAudit</span>
    <span class="topbar-sub">Cold Prospect Framework</span>
  </div>
  <div class="topbar-right">
    <div class="progress-pill"><span id="done-count">0</span> / <span id="total-count">0</span> done</div>
    <div class="overall-bar-wrap"><div class="overall-bar" id="overall-bar"></div></div>
    <button class="btn-findings" onclick="openModal()">
      <span class="dot"></span>
      View Findings
    </button>
  </div>
</header>

<!-- CLIENT BANNER -->
<div class="client-banner">
  <span class="client-label">Auditing:</span>
  <input class="client-input" id="client-name" placeholder="Enter business name…" maxlength="80" />
  <span class="client-badge" id="client-industry-badge">No client set</span>
  <span class="autosave-global">
    <span class="dot-live"></span>
    <span id="global-save-status">All changes autosaved</span>
  </span>
</div>

<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main"></main>
</div>

<!-- FINDINGS MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-header-left">
        <div class="modal-title">Audit Findings</div>
        <div class="modal-sub" id="modal-sub">All recorded findings for this audit</div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-tabs">
        <button class="modal-tab active" onclick="switchTab('summary')">Summary</button>
        <button class="modal-tab" onclick="switchTab('all')">All Findings</button>
        <button class="modal-tab" onclick="switchTab('export')">Export / Report Data</button>
      </div>
      <div class="modal-tab-content active" id="tab-summary"></div>
      <div class="modal-tab-content" id="tab-all"></div>
      <div class="modal-tab-content" id="tab-export"></div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
